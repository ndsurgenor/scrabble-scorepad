<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Scrabble ScorePAD</title>
    <!-- Bootstrap CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
</head>

<body class="bg-light py-5">
    <div class="container">
        <div class="row justify-content-center">
            <div class="col-md-8 col-lg-6">
                <h1 class="text-center mb-4 text-primary">Scrabble ScorePAD</h1>

                {% if errors %}
                    <div class="alert alert-danger shadow-sm">
                        <ul class="mb-0">
                            {% for error in errors %}
                                <li>{{ error }}</li>
                            {% endfor %}
                        </ul>
                    </div>
                {% endif %}

                <div class="card shadow-sm mb-4">
                    <div class="card-body">
                        <form action="/score" method="post">
                            <div class="mb-3">
                                <label for="wordlist" class="form-label fw-bold">Wordlist:</label>
                                <select name="wordlist" id="wordlist" class="form-select">
                                    <option value="wl-eu-sowpods.txt">EU/World (SOWPODS)</option>
                                    <option value="wl-us-twl.txt">USA/Canada (TWL)</option>
                                </select>
                            </div>
                            <div class="mb-3">
                                <label for="word" class="form-label fw-bold">Word (+ modifiers):</label>
                                <div class="input-group">
                                    <input type="text" id="word" name="word" class="form-control" required placeholder="Enter word here">
                                    <span class="input-group-text text-muted">(e.g. W*ORD3S)</span>
                                </div>
                            </div>
                            <div class="mb-3">
                                <label class="form-label fw-bold">Word score multiplier:</label>
                                <div class="d-flex gap-3">
                                    <div class="form-check">
                                        <input class="form-check-input" type="radio" id="mult1" name="multiplier" value="1" checked>
                                        <label class="form-check-label" for="mult1">None</label>
                                    </div>
                                    <div class="form-check">
                                        <input class="form-check-input" type="radio" id="mult2" name="multiplier" value="2">
                                        <label class="form-check-label" for="mult2">Double</label>
                                    </div>
                                    <div class="form-check">
                                        <input class="form-check-input" type="radio" id="mult3" name="multiplier" value="3">
                                        <label class="form-check-label" for="mult3">Triple</label>
                                    </div>
                                </div>
                            </div>
                            <div class="mb-4 form-check">
                                <input class="form-check-input" type="checkbox" id="bonus" name="bonus" value="50">
                                <label class="form-check-label" for="bonus">All tiles played bonus <span class="badge bg-success rounded-pill">+50 points</span></label>
                            </div>

                            <button type="submit" class="btn btn-primary w-100 btn-lg">Score Word</button>
                        </form>
                    </div>
                </div>

                <div class="card shadow-sm">
                    <div class="card-header bg-white d-flex justify-content-between align-items-center py-3">
                        <h4 class="h5 mb-0 text-secondary">Scored Words</h4>
                        <h4 class="h5 mb-0 text-dark">Total Score: <span class="badge bg-primary fs-6">{{ total_score }}</span></h4>
                    </div>
                    <ul class="list-group list-group-flush">
                        {% for score in scores %}
                            <li class="list-group-item">{{ score }}</li>
                        {% else %}
                            <li class="list-group-item text-muted text-center py-4">No words scored yet. Start playing!</li>
                        {% endfor %}
                    </ul>
                </div>

            </div>
        </div>
    </div>
    
    <!-- Bootstrap JS (optional, but good for interactive components if you add them later) -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
